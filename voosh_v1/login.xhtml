<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Login do Sistema</title>
</h:head>
<h:body>
    <h:form>
        <h:messages globalOnly="true" style="color:red" />

        <h:panelGrid columns="2">
            <h:outputLabel value="E-mail:" for="email" />
            <h:inputText id="email" value="#{loginBean.email}" required="true" />

            <h:outputLabel value="Senha:" for="senha" />
            <h:inputSecret id="senha" value="#{loginBean.senha}" required="true" />

            <h:commandButton value="Entrar" action="#{loginBean.efetuarLogin}" />
            <h:link outcome="cadastro" value="Criar nova conta" />
        </h:panelGrid>
    </h:form>
</h:body>
</html>
