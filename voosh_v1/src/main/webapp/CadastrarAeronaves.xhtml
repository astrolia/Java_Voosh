<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Gerenciamento de Aeronaves - Voosh</title>
</h:head>

<h:body style="margin: 20px; font-family: Arial, sans-serif;">

    <div style="margin-bottom: 20px;">
        <p:button value="Aeronaves" icon="pi pi-send" styleClass="ui-button-outlined" disabled="true" style="margin-right: .5rem;" />
        <p:button value="Ir para Modelos" icon="pi pi-sliders-h" outcome="CadastrarModelos.xhtml" styleClass="ui-button-flat" />
    </div>

    <f:importConstants type="com.voosh.vooshv1.model.StatusAeronave" var="StatusEnum" />

    <h:form id="formSistema">

        <p:growl id="mensagens" showDetail="true" keepAlive="true" />

        <p:panel header="Cadastrar / Editar Aeronave" style="margin-bottom:20px">

            <h:panelGrid columns="2" cellpadding="5" style="margin-bottom: 10px;">
                <p:outputLabel for="tipo" value="Tipo de Aeronave:" />
                <p:selectOneButton id="tipo" value="#{aeronaveBean.tipoAeronave}" disabled="#{aeronaveBean.aeronave.id gt 0}">
                    <f:selectItem itemLabel="Turbofan" itemValue="TURBOFAN" />
                    <f:selectItem itemLabel="Turboélice" itemValue="TURBOELICE" />
                    <p:ajax listener="#{aeronaveBean.limpar}" update="painelCampos" process="@this" />
                </p:selectOneButton>
            </h:panelGrid>

            <h:panelGroup id="painelCampos">
                <h:panelGrid columns="2" cellpadding="5">

                    <p:outputLabel for="autoModelo" value="Modelo:" />
                    <p:autoComplete id="autoModelo"
                                    value="#{aeronaveBean.aeronave.modelo}"
                                    completeMethod="#{aeronaveBean.sugerirModelos}"
                                    var="m"
                                    itemLabel="#{m.nome}"
                                    itemValue="#{m}"
                                    converter="modeloConverter"
                                    forceSelection="true"
                                    required="true"
                                    requiredMessage="É obrigatório buscar e selecionar um modelo." />

                    <p:outputLabel for="nome" value="Nome:" />
                    <p:inputText id="nome" value="#{aeronaveBean.aeronave.nome}" required="true"
                                 requiredMessage="O campo Nome é obrigatório." />

                    <p:outputLabel for="matricula" value="Matrícula:" />
                    <p:inputText id="matricula" value="#{aeronaveBean.aeronave.matricula}" required="true"
                                 requiredMessage="O campo Matrícula é obrigatório." />

                    <p:outputLabel for="autonomia" value="Autonomia (km):" />
                    <p:inputNumber id="autonomia" value="#{aeronaveBean.aeronave.autonomia}" decimalPlaces="0" />

                    <p:outputLabel for="status" value="Status:" />
                    <p:selectOneMenu id="status" value="#{aeronaveBean.aeronave.statusAeronave}" required="true"
                                     requiredMessage="O campo Status é obrigatório.">
                        <f:selectItem itemLabel="Selecione..." itemValue="" noSelectionOption="true" />

                        <f:selectItems value="#{aeronaveBean.statusOpcoes}" var="st"
                                       itemLabel="#{st}" itemValue="#{st}" />
                    </p:selectOneMenu>


                    <p:outputLabel for="turbinas" value="Número de Turbinas:"
                                   rendered="#{aeronaveBean.tipoAeronave eq 'TURBOFAN'}" />
                    <p:inputNumber id="turbinas" value="#{aeronaveBean.aeronave.nTurbinas}" decimalPlaces="0" required="true"
                                   rendered="#{aeronaveBean.tipoAeronave eq 'TURBOFAN'}"
                                   requiredMessage="O número de turbinas é obrigatório." />

                    <p:outputLabel for="rvsm" value="Certificação RVSM:"
                                   rendered="#{aeronaveBean.tipoAeronave eq 'TURBOFAN'}" />
                    <p:selectBooleanButton id="rvsm" value="#{aeronaveBean.aeronave.rvsm}"
                                           onLabel="Sim" offLabel="Não" onIcon="pi pi-check" offIcon="pi pi-times"
                                           rendered="#{aeronaveBean.tipoAeronave eq 'TURBOFAN'}" />


                    <p:outputLabel for="tipoHelice" value="Tipo de Hélice:"
                                   rendered="#{aeronaveBean.tipoAeronave eq 'TURBOELICE'}" />
                    <p:inputText id="tipoHelice" value="#{aeronaveBean.aeronave.tipoHelice}" required="true"
                                 rendered="#{aeronaveBean.tipoAeronave eq 'TURBOELICE'}"
                                 requiredMessage="O tipo de hélice é obrigatório." />

                    <p:outputLabel for="stol" value="Capacidade STOL:"
                                   rendered="#{aeronaveBean.tipoAeronave eq 'TURBOELICE'}" />
                    <p:selectBooleanButton id="stol" value="#{aeronaveBean.aeronave.capacidadeSTOL}"
                                           onLabel="Sim" offLabel="Não" onIcon="pi pi-check" offIcon="pi pi-times"
                                           rendered="#{aeronaveBean.tipoAeronave eq 'TURBOELICE'}" />


                    <p:commandButton value="Salvar" action="#{aeronaveBean.salvar}"
                                     update="formSistema" styleClass="ui-button-success" />
                </h:panelGrid>
            </h:panelGroup>
        </p:panel>

        <p:dataTable id="tabela" value="#{aeronaveBean.listaAeronave}" var="aero"
                     paginator="true" rows="10" emptyMessage="Nenhuma aeronave encontrada.">

            <p:column headerText="ID" width="50">
                <h:outputText value="#{aero.id}" />
            </p:column>

            <p:column headerText="Nome">
                <h:outputText value="#{aero.nome}" />
            </p:column>

            <p:column headerText="Matrícula" width="120">
                <h:outputText value="#{aero.matricula}" />
            </p:column>

            <p:column headerText="Autonomia" width="120">
                <h:outputText value="#{aero.autonomia} km" />
            </p:column>

            <p:column headerText="Status" width="130" style="text-align: center;">
                <h:outputText value="#{aero.statusAeronave}" />
            </p:column>

            <p:column headerText="Ações" width="120">

                <p:button icon="pi pi-eye"
                          outcome="CadastrarAeronaveDetalhes.xhtml"
                          styleClass="ui-button-info mr-2"
                          title="Ver Ficha Técnica">
                    <f:param name="id" value="#{aero.id}" />
                </p:button>

                <p:commandButton icon="pi pi-pencil"
                                 action="#{aeronaveBean.prepararEdicao(aero)}"
                                 update="formSistema"
                                 process="@this"
                                 styleClass="ui-button-warning mr-2"
                                 title="Editar" >
                </p:commandButton>

                <p:commandButton icon="pi pi-trash" action="#{aeronaveBean.excluir}"
                                 update="formSistema" styleClass="ui-button-danger" process="@this" title="Excluir">
                    <f:setPropertyActionListener value="#{aero}" target="#{aeronaveBean.aeronave}" />
                    <p:confirm header="Confirmação" message="Deseja mesmo excluir esta aeronave?" icon="pi pi-exclamation-triangle" />
                </p:commandButton>
            </p:column>
        </p:dataTable>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
        </p:confirmDialog>

    </h:form>
</h:body>
</html>
