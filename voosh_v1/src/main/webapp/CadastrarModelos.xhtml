<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Cadastro de Modelos de Aeronaves</title>
</h:head>

<h:body style="margin: 20px; font-family: Arial, sans-serif;">

    <div style="margin-bottom: 20px;">
        <p:button value="Modelos" icon="pi pi-send" styleClass="ui-button-outlined" disabled="true" style="margin-right: .5rem;" />
        <p:button value="Ir para Aeronaves" icon="pi pi-sliders-h" outcome="CadastrarAeronaves.xhtml" styleClass="ui-button-flat" />
    </div>

    <h:form id="formModelo">
        <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true" />

        <p:panel header="Gerenciar Modelo de Aeronave" style="margin-bottom: 20px;">
            <h:panelGrid columns="3" cellpadding="7" id="painelCampos">

                <h:inputHidden value="#{modeloBean.modelo.id}" />
                <h:panelGroup />
                <h:panelGroup />

                <p:outputLabel for="nome" value="Nome do Modelo:" style="font-weight: bold;" />
                <p:inputText id="nome" value="#{modeloBean.modelo.nome}"
                             required="true"
                             requiredMessage="O nome do modelo é obrigatório."
                             placeholder="Ex: Embraer 195, Boeing 777" />
                <p:message for="nome" />

                <p:outputLabel for="fabricante" value="Fabricante:" style="font-weight: bold;" />
                <p:inputText id="fabricante" value="#{modeloBean.modelo.fabricante}"
                             required="true"
                             requiredMessage="O fabricante é obrigatório."
                             placeholder="Ex: Embraer, Airbus, Boeing" />
                <p:message for="fabricante" />

                <p:outputLabel for="assentos" value="Assentos:" style="font-weight: bold;" />
                <p:inputNumber id="assentos" value="#{modeloBean.modelo.assentos}"
                               decimalPlaces="0"
                               minValue="1"
                               required="true"
                               requiredMessage="A capacidade é obrigatória."
                               placeholder="Ex: 180" />
                <p:message for="assentos" />

                <p:outputLabel for="motor" value="Motor:" style="font-weight: bold;" />
                <p:inputText id="motor" value="#{modeloBean.modelo.motor}"
                             required="true"
                             requiredMessage="O Motor é obrigatório."/>
                <p:message for="motor" />

                <p:outputLabel for="cargaMax" value="Carga Máxima (kg):" style="font-weight: bold;" />
                <p:inputNumber id="cargaMax" value="#{modeloBean.modelo.cargaMax}"
                               decimalPlaces="2"
                               minValue="0.00"
                               required="true"
                               requiredMessage="A carga máxima é obrigatória."
                               placeholder="Ex: 18000.50"/>
                <p:message for="cargaMax" />

                <p:outputLabel for="capacidadeCombustivel" value="Capac. Combustível (L):" style="font-weight: bold;" />
                <p:inputNumber id="capacidadeCombustivel" value="#{modeloBean.modelo.capacidadeCombustivel}"
                               decimalPlaces="2"
                               minValue="0.00"
                               required="true"
                               requiredMessage="A capacidade de combustível é obrigatória."
                               placeholder="Ex: 26000.00"/>
                <p:message for="capacidadeCombustivel" />

                <p:outputLabel for="consumoCombustivel" value="Consumo (L/h):" style="font-weight: bold;" />
                <p:inputNumber id="consumoCombustivel" value="#{modeloBean.modelo.consumoCombustivel}"
                               decimalPlaces="2"
                               minValue="0.00"
                               required="true"
                               requiredMessage="O consumo de combustível é obrigatório."
                               placeholder="Ex: 2400.30"/>
                <p:message for="consumoCombustivel" />

            </h:panelGrid>

            <f:facet name="footer">
                <p:commandButton value="Salvar"
                                 actionListener="#{modeloBean.salvar}"
                                 update="formModelo"
                                 icon="pi pi-check"
                                 styleClass="ui-button-success" style="margin-right: .5rem" />

                <p:commandButton value="Limpar"
                                 actionListener="#{modeloBean.limpar}"
                                 update="painelCampos"
                                 process="@this"
                                 icon="pi pi-times"
                                 styleClass="ui-button-secondary">
                    <p:resetInput target="painelCampos" />
                </p:commandButton>
            </f:facet>
        </p:panel>

        <p:panel header="Modelos Cadastrados">
            <p:dataTable id="tabelaModelos"
                         value="#{modeloBean.listaModelo}"
                         var="item"
                         emptyMessage="Nenhum modelo cadastrado encontrado."
                         paginator="true" rows="10"
                         paginatorPosition="bottom">

                <p:column headerText="ID" style="width: 8%; text-align: center;">
                    <h:outputText value="#{item.id}" />
                </p:column>

                <p:column headerText="Nome do Modelo" sortBy="#{item.nome}">
                    <h:outputText value="#{item.nome}" />
                </p:column>

                <p:column headerText="Fabricante" sortBy="#{item.fabricante}">
                    <h:outputText value="#{item.fabricante}" />
                </p:column>

                <p:column headerText="Capacidade" style="width: 15%; text-align: center;">
                    <h:outputText value="#{item.assentos} pax" />
                </p:column>

                <p:column headerText="Tipo de Motor" style="width: 15%; text-align: center;">
                    <h:outputText value="#{item.motor}" />
                </p:column>

                <p:column headerText="Ações" style="width: 12%; text-align: center;">

                    <p:commandButton icon="pi pi-pencil"
                                     actionListener="#{modeloBean.prepararEditar(item)}"
                                     update="formModelo"
                                     process="@this"
                                     styleClass="ui-button-warning ui-button-flat"
                                     title="Editar Modelo" />

                    <p:commandButton icon="pi pi-trash"
                                     actionListener="#{modeloBean.excluir(item)}"
                                     update="formModelo"
                                     process="@this"
                                     styleClass="ui-button-danger ui-button-flat"
                                     title="Excluir Modelo">
                        <p:confirm header="Confirmação" message="Deseja realmente excluir este modelo?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>

                </p:column>
            </p:dataTable>
        </p:panel>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
        </p:confirmDialog>

    </h:form>
</h:body>
</html>
